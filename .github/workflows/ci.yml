name: SchemaInsight CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — install & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --coverage --coverageReporters=lcov

  sonarqube:
    name: Code quality — SonarQube
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  frontend-build:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  api-test:
    name: API tests — Newman
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server
        working-directory: backend
        run: node src/app.js &
        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/schemainsight

      - name: Wait for server to be ready
        run: |
          for i in {1..15}; do
            curl -s http://localhost:5000/health && break
            echo "Waiting... attempt $i"
            sleep 2
          done

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman tests
        run: newman run postman/schemainsight.postman_collection.json

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t schemainsight-backend ./backend

      - name: Build frontend image
        run: docker build -t schemainsight-frontend ./frontend

  trivy-scan:
    name: Security — Trivy scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scan
        run: docker build -t schemainsight-backend ./backend

      - name: Run Trivy on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: schemainsight-backend
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL